<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #07090F;
      --bg-card:      #0D1220;
      --bg-card-2:    #111827;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);

      --text-primary:  #E2E8F0;
      --text-secondary:#94A3B8;
      --text-muted:    #4B5563;

      --taboola:       #F97316;
      --taboola-dim:   rgba(249,115,22,0.12);
      --taboola-glow:  rgba(249,115,22,0.25);

      --adsense:       #4285F4;
      --adsense-dim:   rgba(66,133,244,0.12);
      --adsense-glow:  rgba(66,133,244,0.25);

      --adx:           #34A853;
      --adx-dim:       rgba(52,168,83,0.12);
      --adx-glow:      rgba(52,168,83,0.25);

      --accent:        #3B82F6;
      --accent-dim:    rgba(59,130,246,0.15);
      --accent-glow:   rgba(59,130,246,0.35);

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    html { font-size: 14px; }

    body {
      width: 380px;
      min-height: 200px;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      padding-bottom: 12px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0D1220 0%, #070B16 100%);
    }
    .header-icon {
      width: 32px; height: 32px;
      background: var(--accent-dim);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-icon svg { width: 18px; height: 18px; }
    .header-text { flex: 1; }
    .header-title {
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .header-sub {
      font-size: 11px; color: var(--text-muted);
      margin-top: 1px;
      font-family: 'Fira Code', monospace;
    }
    .header-badge {
      font-size: 10px; font-family: 'Fira Code', monospace;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 4px;
      padding: 2px 6px;
    }

    /* ── Page Info ── */
    .page-info {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .page-info svg { width: 12px; height: 12px; color: var(--text-muted); flex-shrink: 0; }
    .page-url {
      font-size: 11px; font-family: 'Fira Code', monospace;
      color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Scan Button Area ── */
    .scan-area {
      padding: 16px 18px;
    }
    .scan-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #1E40AF 0%, #3B82F6 100%);
      border: none; border-radius: var(--radius-md);
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: opacity 150ms, transform 150ms, box-shadow 150ms;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
      position: relative; overflow: hidden;
    }
    .scan-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.4); }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .scan-btn-icon { width: 16px; height: 16px; }
    .scan-btn-icon.spinning { animation: spin 0.8s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes countUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ── Status Text ── */
    .status-text {
      text-align: center;
      font-size: 11px; color: var(--text-muted);
      margin-top: 8px;
      font-family: 'Fira Code', monospace;
      min-height: 16px;
    }
    .status-text.scanning { color: var(--accent); }
    .status-text.error { color: #EF4444; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 18px;
    }

    /* ── Results ── */
    #results { animation: fadeIn 250ms ease-out; }

    /* ── Total Banner ── */
    .total-banner {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .total-ring {
      position: relative;
      width: 44px; height: 44px;
      flex-shrink: 0;
    }
    .total-ring svg { width: 44px; height: 44px; transform: rotate(-90deg); }
    .total-ring-bg { fill: none; stroke: var(--border-hover); stroke-width: 3; }
    .total-ring-fill {
      fill: none; stroke: var(--accent);
      stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 113; stroke-dashoffset: 113;
      transition: stroke-dashoffset 800ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .total-ring-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      font-family: 'Fira Code', monospace;
      color: var(--accent);
    }
    .total-info {}
    .total-label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .total-count {
      font-size: 22px; font-weight: 700;
      font-family: 'Fira Code', monospace;
      color: var(--text-primary);
      line-height: 1.1;
      animation: countUp 300ms ease-out;
    }
    .total-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    /* ── Platform Grid ── */
    .platform-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 12px 18px;
    }
    .platform-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 200ms, background 200ms, transform 150ms;
      position: relative; overflow: hidden;
    }
    .platform-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
      transition: opacity 200ms;
    }
    .platform-card.taboola::before { background: var(--taboola); }
    .platform-card.adsense::before { background: var(--adsense); }
    .platform-card.adx::before    { background: var(--adx); }

    .platform-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .platform-card.taboola:hover { background: var(--taboola-dim); border-color: var(--taboola-glow); }
    .platform-card.adsense:hover { background: var(--adsense-dim); border-color: var(--adsense-glow); }
    .platform-card.adx:hover     { background: var(--adx-dim);     border-color: var(--adx-glow); }

    .platform-card.active.taboola { background: var(--taboola-dim); border-color: rgba(249,115,22,0.4); }
    .platform-card.active.adsense { background: var(--adsense-dim); border-color: rgba(66,133,244,0.4); }
    .platform-card.active.adx     { background: var(--adx-dim);     border-color: rgba(52,168,83,0.4); }

    .platform-name {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
      font-weight: 500; margin-bottom: 6px;
    }
    .platform-card.taboola .platform-name { color: var(--taboola); }
    .platform-card.adsense .platform-name { color: var(--adsense); }
    .platform-card.adx     .platform-name { color: var(--adx); }

    .platform-count {
      font-size: 26px; font-weight: 700;
      font-family: 'Fira Code', monospace;
      color: var(--text-primary);
      line-height: 1;
      animation: countUp 400ms ease-out;
    }
    .platform-sub {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px;
    }
    .platform-chevron {
      width: 12px; height: 12px;
      margin: 6px auto 0;
      color: var(--text-muted);
      transition: transform 200ms;
    }
    .platform-card.active .platform-chevron { transform: rotate(180deg); }

    /* ── Detail Breakdown ── */
    .breakdown-section {
      overflow: hidden;
      max-height: 0;
      transition: max-height 300ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .breakdown-section.open { max-height: 600px; }
    .breakdown-inner {
      padding: 0 18px 12px;
    }
    .breakdown-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
      padding-top: 6px;
    }
    .breakdown-title {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    .breakdown-filled-stat {
      font-size: 10px;
      font-family: 'Fira Code', monospace;
      color: var(--text-secondary);
    }

    /* ── Ad Items List ── */
    .ad-items-list {
      display: flex; flex-direction: column; gap: 4px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .ad-items-list::-webkit-scrollbar { width: 3px; }
    .ad-items-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ad-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: border-color 150ms;
    }
    .ad-item:hover { border-color: var(--border-hover); }

    .ad-status-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-filled { background: #22C55E; box-shadow: 0 0 5px rgba(34,197,94,0.5); }
    .dot-empty  { background: var(--text-muted); }

    .ad-item-info {
      flex: 1; display: flex; align-items: center; gap: 5px; min-width: 0;
    }
    .ad-item-index {
      font-size: 10px; font-family: 'Fira Code', monospace;
      color: var(--text-muted); flex-shrink: 0;
    }
    .ad-item-type {
      font-size: 11px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ad-item-size {
      font-size: 10px; font-family: 'Fira Code', monospace;
      color: var(--text-muted); flex-shrink: 0; min-width: 58px;
      text-align: right;
    }
    .ad-item-badge {
      font-size: 10px; padding: 1px 5px;
      border-radius: 3px; flex-shrink: 0;
    }
    .badge-filled { color: #22C55E; background: rgba(34,197,94,0.1); }
    .badge-empty  { color: var(--text-muted); background: rgba(255,255,255,0.05); }

    /* ── Empty / No Ads ── */
    .empty-state {
      padding: 24px 18px;
      text-align: center;
      animation: fadeIn 250ms ease-out;
    }
    .empty-icon {
      width: 40px; height: 40px;
      margin: 0 auto 10px;
      color: var(--text-muted);
    }
    .empty-title { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
    .empty-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* ── Error State ── */
    .error-state {
      padding: 16px 18px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: var(--radius-md);
      margin: 12px 18px;
      animation: fadeIn 250ms ease-out;
    }
    .error-state p { font-size: 12px; color: #FCA5A5; }

    /* ── Footer ── */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px 2px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .footer-time {
      font-size: 10px; font-family: 'Fira Code', monospace;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 5px;
    }
    .footer-time svg { width: 10px; height: 10px; }
    .footer-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 6px rgba(34,197,94,0.6);
      position: relative;
    }
    .footer-dot::after {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: rgba(34,197,94,0.3);
      animation: pulse-ring 1.5s ease-out infinite;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-2) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="2"/>
        <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">Ad Scanner</div>
      <div class="header-sub">taboola · adsense · adx</div>
    </div>
    <span class="header-badge">v1.0</span>
  </header>

  <!-- Page Info -->
  <div class="page-info">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span class="page-url" id="pageUrl">—</span>
  </div>

  <!-- Scan Area -->
  <div class="scan-area">
    <button class="scan-btn" id="scanBtn" aria-label="扫描当前页面广告">
      <svg class="scan-btn-icon" id="scanIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      扫描当前页面
    </button>
    <div class="status-text" id="statusText">点击开始扫描广告</div>
  </div>

  <!-- Results container -->
  <div id="mainContent"></div>

  <script src="popup.js"></script>
</body>
</html>
